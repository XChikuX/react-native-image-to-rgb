buildscript {
  ext.getExtOrDefault = { name ->
    return rootProject.ext.has(name)
      ? rootProject.ext.get(name)
      : project.properties["AiImage_" + name]
  }

  repositories {
    google()
    mavenCentral()
  }

  dependencies {
    classpath "com.android.tools.build:gradle:7.4.2"
    // noinspection DifferentKotlinGradleVersion
    classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:${getExtOrDefault('kotlinVersion')}"
  }
}

def isNewArchitectureEnabled() {
  return rootProject.hasProperty("newArchEnabled") && rootProject.getProperty("newArchEnabled") == "true"
}

apply plugin: "com.android.library"
apply plugin: "kotlin-android"

// Apply Nitrogen autolinking (adds generated Kotlin sources + boost message).
apply from: '../nitrogen/generated/android/NitroAiImage+autolinking.gradle'

if (isNewArchitectureEnabled()) {
  apply plugin: "com.facebook.react"
}

def getExtOrDefault(name) {
  return rootProject.ext.has(name) ? rootProject.ext.get(name) : project.properties["AiImage_" + name]
}

def getExtOrIntegerDefault(name) {
  return rootProject.ext.has(name) ? rootProject.ext.get(name) : (project.properties["AiImage_" + name]).toInteger()
}

android {
  // Namespace renamed away from `com.imagetorgb` so the generated
  // `BuildConfig`, `R`, and other namespace-scoped classes do not collide
  // with the legacy `react-native-image-to-rgb` package (which still ships
  // `com.imagetorgb.BuildConfig`) when both are installed side-by-side.
  namespace "com.aiimage"

  ndkVersion getExtOrDefault("ndkVersion")
  compileSdkVersion getExtOrIntegerDefault("compileSdkVersion")

  defaultConfig {
    minSdkVersion getExtOrIntegerDefault("minSdkVersion")
    targetSdkVersion getExtOrIntegerDefault("targetSdkVersion")
    buildConfigField "boolean", "IS_NEW_ARCHITECTURE_ENABLED", isNewArchitectureEnabled().toString()

    externalNativeBuild {
      cmake {
        cppFlags "-frtti -fexceptions -Wall -Wextra -fstack-protector-all"
        arguments "-DANDROID_STL=c++_shared"
        abiFilters "armeabi-v7a", "x86", "x86_64", "arm64-v8a"

        // Pass the nitro-modules project directory so CMake can search it
        // even when Prefab metadata is incomplete (common in Expo/EAS builds).
        def nitroDir = null
        try {
          nitroDir = project(':react-native-nitro-modules').projectDir
        } catch (Exception ignored) {
          // Project dependency may not be resolvable yet during configure
          def candidate = file("${rootProject.projectDir}/../node_modules/react-native-nitro-modules/android")
          if (!candidate.exists()) {
            candidate = file("${projectDir}/../../react-native-nitro-modules/android")
          }
          if (candidate.exists()) {
            nitroDir = candidate
          }
        }
        if (nitroDir != null) {
          arguments "-DNITRO_MODULES_DIR=${nitroDir}"
        }
      }
    }
  }

  externalNativeBuild {
    cmake {
      path "CMakeLists.txt"
    }
  }

  buildFeatures {
    buildConfig true
    prefab true
  }

  packagingOptions {
    excludes = [
      "META-INF",
      "META-INF/**",
      "**/libc++_shared.so",
      "**/libfbjni.so",
      "**/libjsi.so",
      "**/libreactnative.so",
      "**/libreactnativejni.so",
    ]
  }

  buildTypes {
    release {
      minifyEnabled false
    }
  }

  lintOptions {
    disable "GradleCompatible"
  }

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_1_8
    targetCompatibility JavaVersion.VERSION_1_8
  }

  sourceSets {
    main {
      if (isNewArchitectureEnabled()) {
        java.srcDirs += [
          "${project.buildDir}/generated/source/codegen/java"
        ]
      }
    }
  }
}

repositories {
  mavenCentral()
  google()
}

dependencies {
  // For < 0.71, this will be from the local maven repo
  // For > 0.71, this will be replaced by `com.facebook.react:react-android:$version` by the react gradle plugin
  //noinspection GradleDynamicVersion
  implementation "com.facebook.react:react-native:+"
  implementation "org.jetbrains.kotlin:kotlin-stdlib:${getExtOrDefault('kotlinVersion')}"
  implementation "androidx.exifinterface:exifinterface:1.3.7"
  implementation project(":react-native-nitro-modules")
}

// Gradle/Prefab can otherwise configure this module's CMake target before
// react-native-nitro-modules has produced its native Prefab package. When that
// happens, CMake sees only Nitro's headers and the final link misses
// libNitroModules.so, producing undefined margelo::nitro::* symbols.
// Make our CMake configure/build tasks wait for Nitro's native + Prefab tasks.
afterEvaluate {
  // Try multiple project reference formats used across RN autolinkers
  def nitroProject = rootProject.findProject(":react-native-nitro-modules")
  if (nitroProject == null) {
    nitroProject = rootProject.findProject(":react-native-nitro-modules_react-native-nitro-modules")
  }
  if (nitroProject == null) {
    // Expo autolinking may use a different naming scheme
    rootProject.subprojects.find { sub ->
      if (sub.name.contains("nitro-modules") || sub.path.contains("nitro-modules")) {
        nitroProject = sub
        return true
      }
      return false
    }
  }

  if (nitroProject != null) {
    tasks.configureEach { task ->
      def matcher = task.name =~ /^(configureCMake|buildCMake)([^\[]+)(\[.+\])?$/
      if (matcher.matches()) {
        def variantName = matcher[0][2]
        // Depend on Nitro's native build and prefab packaging tasks.
        // Match multiple naming conventions across AGP versions (7.x, 8.x+).
        task.dependsOn(nitroProject.tasks.matching { nitroTask ->
          nitroTask.name == "externalNativeBuild${variantName}" ||
            nitroTask.name == "buildCMake${variantName}" ||
            nitroTask.name == "configureCMake${variantName}" ||
            nitroTask.name == "prefab${variantName}ConfigurePackage" ||
            nitroTask.name == "prefab${variantName}Package" ||
            nitroTask.name == "createPrefab${variantName}Package" ||
            nitroTask.name == "merge${variantName}NativeLibs" ||
            nitroTask.name == "copy${variantName}JniLibsProjectOnly"
        })
      }
    }
  } else {
    logger.warn("[NitroAiImage] Could not find react-native-nitro-modules project for task ordering. " +
      "CMake may fail if Nitro's native build hasn't completed first.")
  }
}

if (isNewArchitectureEnabled()) {
  react {
    jsRootDir = file("../src/")
    libraryName = "AiImage"
    codegenJavaPackageName = "com.aiimage"
  }
}
